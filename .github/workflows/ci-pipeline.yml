name: DevSecOps CI/CD Pipeline

on:
  push:
    branches:
      - dev

env:
  IMAGE_NAME: nodejs-task-manager
  IMAGE_TAG: v${{ github.run_number }}

jobs:

# -------------------------------
# Checkout Source Code
# -------------------------------

  checkout:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4


# -------------------------------
# Secret Scan
# -------------------------------

  secret_scan:
    runs-on: ubuntu-latest
    needs: checkout

    steps:
      - uses: actions/checkout@v4

      - name: Scan repository for leaked secrets
        uses: gitleaks/gitleaks-action@v2


#---------------------------------
# Code Quality Scan
#---------------------------------

  code_scan:
    runs-on: ubuntu-latest
    needs: secret_scan

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v2
        env:
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Check Quality Gate
        uses: SonarSource/sonarqube-quality-gate-action@v1
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}


# -------------------------------
# Dependency and filesystem scan
# --------------------------------
  
  vulnerability_scan:
    runs-on: ubuntu-latest
    needs: code_scan

    steps:
      - uses: actions/checkout@v4

      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y wget tar

          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | gpg --dearmor | sudo tee /usr/share/keyrings/trivy.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb generic main" | sudo tee -a /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install trivy

      - name: Run Trivy Scan
        run: |
          trivy fs --severity HIGH,CRITICAL --exit-code 1 .


# -------------------------------
# Dockerfile Lint
# -------------------------------

  dockerfile_scan:
    runs-on: ubuntu-latest
    needs: vulnerability_scan

    steps:
      - uses: actions/checkout@v4

      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@v3.3.0


# -------------------------------
# Build Docker Image
# -------------------------------

  build_image:
    runs-on: ubuntu-latest
    needs: dockerfile_scan

    steps:
      - uses: actions/checkout@v4

      - name: Setup Docker builder
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/${IMAGE_NAME}:${IMAGE_TAG} .

      - name: Save Docker image
        run: |
          docker save ${{ secrets.DOCKER_USERNAME }}/${IMAGE_NAME}:${IMAGE_TAG} -o /tmp/image.tar

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: /tmp/image.tar
          retention-days: 1


# -------------------------------
# Scan Docker Image
# -------------------------------

  image_scan:
    runs-on: ubuntu-latest
    needs: build_image

    steps:
      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: /tmp

      - name: Load Docker image
        run: |
          docker load -i /tmp/image.tar

      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y wget tar

          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | gpg --dearmor | sudo tee /usr/share/keyrings/trivy.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb generic main" | sudo tee -a /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install trivy

      - name: Run Trivy Scan on image
        run: |
          trivy image --severity CRITICAL --exit-code 1 ${{ secrets.DOCKER_USERNAME }}/${IMAGE_NAME}:${IMAGE_TAG}


# -------------------------------
# Push Docker Image
# -------------------------------

  push_image:
    runs-on: ubuntu-latest
    needs: image_scan

    steps:
      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: /tmp

      - name: Load Docker image
        run: |
          docker load -i /tmp/image.tar

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Push image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/${IMAGE_NAME}:${IMAGE_TAG}



# -------------------------------
# Update Kubernetes Manifest (GitOps Deploy)
# -------------------------------

  deploy:
    runs-on: ubuntu-latest
    needs: push_image

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # -------------------------------
      # Update image tag in deployment.yaml
      # -------------------------------
      - name: Update Kubernetes manifest
        run: |
          echo "Updating image tag in app-deployment.yaml..."

          sed -i "s|image: .*|image: ${{ secrets.DOCKER_USERNAME }}/nodejs-task-manager:v${{ github.run_number }}|" k8s/app-deployment.yaml

          echo "Updated file:"
          cat k8s/app-deployment.yaml

      # -------------------------------
      # Commit and push changes
      # -------------------------------
      - name: Commit and push updated manifest
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add k8s/app-deployment.yaml

          git commit -m "Update image to v${{ github.run_number }}" || echo "No changes to commit"

          git push












