name: CI/CD
on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: checkout application code
        uses: actions/checkout@v4

      - name: Setup Docker Buildx 
        uses: docker/setup-buildx-action@v3
      
      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME  }}
          password: ${{ secrets.DOCKER_TOKEN}}
            
      - name: Extract metadata (tag, lables) for docker
        id: meta
        uses: docker/metadata-action@v5
        with: 
          images: ${{ secrets.DOCKER_USERNAME }}/nodejs-task-manager
          tags: | 
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}
     
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context:
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}    
     
      - name: Deploy to EC2 
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{secrets.EC2_HOST}}
          username: ${{secrets.EC2_USER}}
          key: ${{secrets.EC2_SSH_KEY}}
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/nodejs-task-manager:latest
            docker stop nodejs-task-manager_app || true
            docker rm nodejs-task-manager_app || true
            docker run -d -p 3000:3000 --name nodejs-task-manager_app ${{ secrets.DOCKER_USERNAME }}/nodejs-task-manager:latest    

