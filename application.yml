apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: task-manager
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Bhavnesh-Sharma/Devops-task-manager.git
    targetRevision: dev
    path: k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: task-manager
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    automated:
      prune: true
      selfHeal: true

