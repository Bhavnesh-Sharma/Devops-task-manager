apiVersion: apps/v1
kind: Deployment
metadata:
  name: task-manager
  namespace: task-manager
spec:
  replicas: 2

  selector:
    matchLabels:
      app: task-manager

  template:
    metadata:
      labels:
        app: task-manager

    spec:
      automountServiceAccountToken: false

      containers:
        - name: task-manager
          image: bhuvi17/nodejs-task-manager:${IMAGE_TAG}

          ports:
            - containerPort: 3000

          env:
            - name: MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: MONGO_URI

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "300m"
              memory: "256Mi"

          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10

          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: task-manager-service
  namespace: task-manager
spec:
  type: NodePort

  selector:
    app: task-manager

  ports:
    - protocol: TCP
      port: 3000
      targetPort: 3000
      nodePort: 30007
