apiVersion: apps/v1
kind: Deployment
metadata:
  name: task-manager
  namespace: task-manager
spec:
  replicas: 2
  selector:
    matchLabels:
      app: task-manager
  template:
    metadata:
      labels:
        app: task-manager
    spec:
      containers:
        - name: task-manager
          image: bhuvi17/nodejs-task-manager:latest
          ports:
            - containerPort: 3000      
          env:
            - name: MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: MONGO_URI  
---

apiVersion: v1
kind: Service
metadata:
  name: task-manager-service
  namespace: task-manager
spec:
  selector:
    app: task-manager
  ports: 
    - protocol: TCP
      port: 3000
      targetPort: 3000
      nodePort : 30007 

  type: NodePort        

